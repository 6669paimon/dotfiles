set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
# set-option -ga terminal-overrides ",xterm-256color:Tc"

unbind C-b
set -g prefix C-s
bind C-s send-prefix

unbind '"'
unbind %
bind | split-window -h
bind \\ split-window -v

set -g escape-time 0

set -g set-titles on
set -g set-titles-string '#S:#I.#P #W'

set -g base-index 1
setw -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# VI 
set -g status-keys vi
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi 'C-v' send -X begin-selection \; send -X rectangle-toggle
# bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel clip.exe

# Select pane use Alt
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'M-h' if-shell "$is_vim" { send-keys M-h } { if-shell -F '#{pane_at_left}'   {} { select-pane -L } }
bind-key -n 'M-j' if-shell "$is_vim" { send-keys M-j } { if-shell -F '#{pane_at_bottom}' {} { select-pane -D } }
bind-key -n 'M-k' if-shell "$is_vim" { send-keys M-k } { if-shell -F '#{pane_at_top}'    {} { select-pane -U } }
bind-key -n 'M-l' if-shell "$is_vim" { send-keys M-l } { if-shell -F '#{pane_at_right}'  {} { select-pane -R } }
bind-key -T copy-mode-vi 'M-h' if-shell -F '#{pane_at_left}'   {} { select-pane -L }
bind-key -T copy-mode-vi 'M-j' if-shell -F '#{pane_at_bottom}' {} { select-pane -D }
bind-key -T copy-mode-vi 'M-k' if-shell -F '#{pane_at_top}'    {} { select-pane -U }
bind-key -T copy-mode-vi 'M-l' if-shell -F '#{pane_at_right}'  {} { select-pane -R }

# Select window
bind -n M-J previous-window
bind -n M-K next-window

# Moving window
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window

# Resizing pane
bind -r k resize-pane -U 5
bind -r j resize-pane -D 5
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
# setw -g mouse on
# bind o run-shell "open #{pane_current_path}"
# bind -r e kill-pane -a

# set -g status off

# Color
# set-option -g status-fg "#808c8c"
# set-option -g status-bg "#00212B"
set-option -g status-fg cyan
set-option -g status-bg black
set -g pane-active-border-style fg=colour166,bg=default
set -g window-style fg=colour10,bg=default
set -g window-active-style fg=colour12,bg=default
#### COLOUR
# default statusbar colors
# set-option -g status-style bg=colour235,fg=colour136,default
# default window title colors
# set-window-option -g window-status-style fg="#808c8c",bg=default,dim
# set-window-option -g window-status-style fg="#3f6775",bg=default,dim
set-window-option -g window-status-style fg=colour244,bg=default,dim
# active window title colors
set-window-option -g window-status-current-style fg=colour166,bg=default,bright
# set-window-option -g window-status-current-style fg="#93A1A1",bg="#003847",bright
# pane border
set-option -g pane-border-style fg=colour235 #base02
set-option -g pane-active-border-style fg=colour136,bg=colour235
# set-option -g pane-active-border-style fg=colour136,bg=default
# message text
# set-option -g message-style bg=colour235,fg=colour166
set-option -g message-style bg=default,fg=colour166
# pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange
# clock
set-window-option -g clock-mode-colour colour64 #green

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# color prefix-highlight
set -g @prefix_highlight_fg 'colour235'
set -g @prefix_highlight_bg 'color166'

set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left "#[default]#[fg=cyan][#S] "
# set -g status-left "#[fg=white,bg=#d33682,bold]   #[default]#[fg=cyan][#S] "
# set-option -g status-justify absolute-centre

setw -g window-status-format '#I:#W'
setw -g window-status-current-format '[ #I]#[fg=cyan]:#W'

set -g status-right '#{prefix_highlight}  [%a %Y-%m-%d %H:%M]'

run -b '~/.config/tmux/plugins/tpm/tpm'
